<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>חידות גפרורים</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
margin-top:30px;
}

#board{
width:600px;
height:300px;
margin:40px auto;
position:relative;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.match{
position:absolute;
width:80px;
height:8px;
background:#d2a679;
border-radius:4px;
cursor:pointer;
}

.match::after{
content:"";
position:absolute;
right:-6px;
top:-3px;
width:14px;
height:14px;
background:#c40000;
border-radius:50%;
}

</style>
</head>

<body>

<h1>חידות גפרורים</h1>
<p>גררו גפרור אחד כדי לפתור</p>

<div id="board">

<div class="match" style="top:120px; left:200px;"></div>
<div class="match" style="top:120px; left:300px;"></div>
<div class="match" style="top:120px; left:400px;"></div>

</div>

<script>

let selected = null;

document.querySelectorAll(".match").forEach(match=>{

match.addEventListener("mousedown",()=>{

selected = match;

});

});

document.addEventListener("mousemove",(e)=>{

if(selected){

selected.style.left = (e.pageX-40)+"px";
selected.style.top = (e.pageY-10)+"px";

}

});

document.addEventListener("mouseup",()=>{

selected = null;

});

</script>

</body>
</html>
