<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>חידות גפרורים</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

h1{
color:#333;
}

.puzzle{
font-size:40px;
margin:30px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}
</style>

<body>

<h1>חידות גפרורים</h1>

<p>הזיזו גפרור אחד כדי לתקן את המשוואה</p>

<div class="puzzle">
IX + V = III
</div>

<button onclick="showHint()">רמז</button>
<button onclick="showAnswer()">פתרון</button>

<script>

function showHint(){
alert("בדקו את הספרה הראשונה");
}

function showAnswer(){
alert("IV + V = IX");
}

</script>
